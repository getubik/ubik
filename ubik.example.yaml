# ─────────────────────────────────────────────────────────────────────
# Psssst! Ubik configuration — the honest reference.
#
# Every field below round-trips through ubik/core/config.py. Run
# `ubik init` for an interactive wizard that produces an equivalent
# file customized to your repo + provider choice.
#
# Roadmap-only knobs (advisor model, scope filters, sandbox network
# allowlist, MCP Apps, observability backends, postgres notebook) are
# documented in docs/roadmap.md and intentionally absent from here.
# ─────────────────────────────────────────────────────────────────────

project:
  name: "my-project"
  repo_path: "."
  default_branch: "main"

# ── Researcher: who reads the world ─────────────────────────────────
researcher:
  llm:
    # Default: GLM-5.1 via Z.AI (#1 SWE-Bench Pro, free with annual plan).
    # Swap any litellm-supported endpoint: openai, anthropic, gemini,
    # bedrock, ollama, groq, …
    provider: "openai_compatible"
    base_url: "https://api.z.ai/api/coding/paas/v4"
    api_key_env: "Z_AI_API_KEY"
    model: "glm-5.1"
    thinking: true
    max_tokens: 8000

  schedule:
    daily_at: "09:00"                  # local time HH:MM
    pulse_every_minutes: 0             # 0 disables the pulse cycle

# ── Executor: who writes the fix ────────────────────────────────────
executor:
  type: "aider"                        # only adapter wired in 0.1.0
  sandbox:
    worktree_dir: "./.ubik-worktrees"  # isolated git worktrees per task
    cost_cap_usd: 5.0                  # per-task hard kill switch
    time_cap_minutes: 15               # per-task hard kill switch
  guardrails:
    cannot_push_to: ["main", "master", "production"]
    require_tests: true
    require_pr_review: true

# ── Bridge: how Ubik talks to you ───────────────────────────────────
bridge:
  type: "telegram"                     # only adapter wired in 0.1.0
  token_env: "TELEGRAM_BOT_TOKEN"
  chat_id_env: "TELEGRAM_CHAT_ID"
  approver_chat_ids:                   # only these chats can approve
    # - 123456789
  rate_limit:
    max_pushes_per_hour: 5
    cooldown_minutes_per_proposal: 60

# ── Verifier: who checks the fix ────────────────────────────────────
verifier:
  test_command: "pytest -q"            # run inside the executor worktree
  build_command: null                  # e.g. "npm run build"
  smoke_command: null                  # post-deploy hit-the-endpoint check
  pr:
    provider: "github"                 # only provider wired in 0.1.0
    repo: ""                           # e.g. "getubik/ubik"; auto-detected if blank
    base_branch: "main"
    auto_create: true

# ── Notebook: where Ubik remembers ──────────────────────────────────
notebook:
  storage: "filesystem"                # postgres backend on the roadmap
  path: "./research"

# ── Cost ceiling — global ───────────────────────────────────────────
cost:
  daily_usd_cap: 15.0                  # informational; Z.AI plan is unlimited
  alert_at_percent: 80
  track_only: false
  max_proposals_per_day: 20            # ENFORCED: drops new proposals over cap
